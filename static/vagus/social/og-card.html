<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vagus — OG Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  .og {
    position: relative;
    width: 1200px;
    height: 630px;
    background:
      radial-gradient(ellipse 720px 480px at 22% 18%, rgba(99,102,241,0.28), transparent 60%),
      radial-gradient(ellipse 600px 400px at 88% 88%, rgba(124,58,237,0.22), transparent 60%),
      radial-gradient(ellipse 1200px 600px at 50% 110%, rgba(79,70,229,0.10), transparent 50%),
      #0a0e14;
    overflow: hidden;
    color: #ffffff;
  }

  /* Faint grid texture */
  .og::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  /* Decorative ECG trend line — echoes the logo's pulse tick, full-bleed across the lower third */
  .ecg {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 90px;
    height: 180px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* Content layer */
  .og-content {
    position: relative;
    z-index: 2;
    padding: 76px 80px;
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  /* Top row: tiny brand strip */
  .top-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #94a3b8;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .top-strip .dot { width: 6px; height: 6px; border-radius: 50%; background: #6366F1; }

  /* Hero lockup */
  .hero {
    margin-top: 64px;
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .hero-mark {
    width: 116px;
    height: 116px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #818CF8;
    filter: drop-shadow(0 0 24px rgba(99,102,241,0.4));
  }
  .hero-word {
    font-size: 132px;
    font-weight: 700;
    letter-spacing: -0.055em;
    line-height: 0.95;
    color: #FFFFFF;
  }

  /* Tagline */
  .tagline {
    margin-top: 28px;
    font-size: 30px;
    font-weight: 500;
    color: #CBD5E1;
    letter-spacing: -0.015em;
    line-height: 1.25;
    max-width: 760px;
  }
  .tagline em {
    font-style: normal;
    color: #FFFFFF;
    font-weight: 600;
  }

  /* Feature chips at bottom */
  .chips {
    margin-top: auto;
    display: flex;
    gap: 10px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 999px;
    background: rgba(99,102,241,0.10);
    border: 1px solid rgba(99,102,241,0.30);
    color: #C7D2FE;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.005em;
    backdrop-filter: blur(8px);
  }
  .chip .icon {
    width: 14px;
    height: 14px;
    color: #818CF8;
  }

  /* Subtle bottom-right URL */
  .url {
    position: absolute;
    right: 80px;
    bottom: 76px;
    font-size: 16px;
    font-weight: 500;
    color: #5B6477;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="og">

  <!-- Background ECG decoration -->
  <svg class="ecg" viewBox="0 0 1200 180" preserveAspectRatio="none">
    <defs>
      <linearGradient id="lineFade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
        <stop offset="40%" stop-color="#6366F1" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- A trend baseline with one pulse echoing the logo -->
    <path d="M 0 120
             L 320 120
             L 360 122
             L 400 118
             L 460 124
             L 530 118
             L 600 122
             L 660 120
             L 700 122
             L 740 115
             L 770 130
             L 800 60
             L 830 100
             L 870 70
             L 910 110
             L 950 90
             L 1000 100
             L 1100 95
             L 1200 95"
          fill="none"
          stroke="url(#lineFade)"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </svg>

  <div class="og-content">

    <!-- Tiny top brand strip -->
    <div class="top-strip">
      <span class="dot"></span>
      <span>Exam analytics platform</span>
    </div>

    <!-- Mark + wordmark lockup -->
    <div class="hero">
      <div class="hero-mark">
        <svg width="116" height="116" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 5L11.5 18.5C11.7 18.9 12.3 18.9 12.5 18.5L14.5 14.5L16 16.5L19.5 4.5"/>
        </svg>
      </div>
      <div class="hero-word">Vagus</div>
    </div>

    <!-- Tagline -->
    <p class="tagline">
      Smarter exam analytics for serious students.<br/>
      <em>Track every exam. Master every topic.</em>
    </p>

    <!-- Feature chips -->
    <div class="chips">
      <span class="chip">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 7L12.5 16.5 8.5 12.5 2 19"/><path d="M16 7h6v6"/></svg>
        Performance Analytics
      </span>
      <span class="chip">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
        Spaced Repetition
      </span>
      <span class="chip">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
        Weak Topic Insights
      </span>
    </div>

  </div>

  <!-- Subtle URL bottom-right -->
  <span class="url">vagus.app</span>

</div>

</body>
</html>
