<a href="{{ href }}"
   class="das-nav-tab{% if request.path == href or shell_active == label %} active{% endif %}">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       aria-hidden="true">
    <use href="#{{ icon }}"/>
  </svg>
  <span>{{ label }}</span>
</a>
