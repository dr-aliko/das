{% load i18n %}
{# DAS-325: Exam notes with blur-triggered auto-save (PATCH to exam_notes_update) #}
<div class="space-y-3">
  <div class="flex items-center justify-between px-1">
    <h3 class="text-xs font-bold uppercase tracking-widest" style="color:var(--muted)">
      {% trans "Sınav Notları" %}
    </h3>
    <div x-show="isSaving" x-transition.opacity class="flex items-center gap-1">
      <svg class="animate-spin h-3 w-3 text-primary" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10"
                stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
        </path>
      </svg>
      <span class="text-[10px] font-bold text-primary uppercase">{% trans "Kaydediliyor…" %}</span>
    </div>
  </div>

  <div class="das-card p-4">
    <textarea
      x-model="examNotes"
      @blur="
        if (examNotes !== initialNotes) {
          isSaving = true;
          fetch('{% url 'student:exam_notes_update' exam.id %}', {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ notes: examNotes })
          })
          .then(r => { if (r.ok) initialNotes = examNotes; })
          .finally(() => { isSaving = false; });
        }
      "
      class="w-full min-h-[120px] bg-transparent border-0 p-0 text-sm
             focus:ring-0 resize-none"
      style="color:var(--body)"
      placeholder="{% trans 'Bu sınavdan ne öğrendin? Zorlandığın konuları veya strateji notlarını buraya ekleyebilirsin…' %}">
    </textarea>
  </div>

  <p class="text-[10px] px-1 italic text-right" style="color:var(--muted-2)">
    {% trans "Odaktan çıkınca otomatik kaydedilir." %}
  </p>
</div>
