{% if first_run %}
<div x-data="{ open: true }" x-show="open" x-cloak
     class="mx-4 mb-4 rounded-2xl p-4 flex items-center gap-3 relative overflow-hidden"
     style="background: linear-gradient(135deg, #6366f1, #4f46e5); color: white;">
  <div class="w-9 h-9 rounded-xl bg-white/20 flex items-center justify-center shrink-0">
    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2"
         viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v1m0 16v1M4.22 4.22l.7.7m12.16 12.16l.7.7M3 12h1m16 0h1M4.22 19.78l.7-.7M18.36 5.64l.7-.7"/>
    </svg>
  </div>
  <div class="flex-1 min-w-0">
    <p class="font-semibold text-sm">Hoş geldin! 🎉</p>
    <p class="text-xs text-white/80 mt-0.5">İlk denemeni ekleyerek analizlere başla.</p>
  </div>
  <a href="/student/exam/new/"
     class="shrink-0 px-4 py-1.5 bg-white text-indigo-700 text-xs font-bold rounded-lg hover:bg-indigo-50 transition">
    Başla →
  </a>
  <button @click="open = false" class="shrink-0 p-1 rounded-lg hover:bg-white/20 transition ml-1">
    <svg class="w-4 h-4 text-white/70" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
{% endif %}
