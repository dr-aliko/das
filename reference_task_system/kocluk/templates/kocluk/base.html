<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Koçluk Paneli{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }

    .task-card {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: taskFadeIn 0.18s ease forwards;
    }
    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(0,0,0,.13);
    }
    .task-card:active { transform: translateY(0) scale(0.98); }

    @keyframes taskFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* Button press effect */
    button { transition: transform 0.1s ease, box-shadow 0.1s ease; }
    button:active:not(:disabled) { transform: scale(0.96); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-gray-100 font-sans text-sm text-gray-800">

  <nav class="print:hidden bg-blue-700 text-white px-6 py-3 flex items-center gap-4 shadow">
    <span class="font-bold text-lg tracking-wide">Koçluk Paneli</span>
    <span class="flex-1"></span>
    <span class="text-blue-200 text-xs">{{ request.user.get_full_name|default:request.user.username }}</span>
    <a href="{% url 'logout' %}" class="text-xs bg-blue-800 hover:bg-blue-900 px-3 py-1 rounded">Çıkış</a>
  </nav>

  <main class="px-4 py-4">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
