<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş – Koçluk Paneli</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-center text-blue-700 mb-6">Koçluk Paneli</h1>
    {% if form.errors %}
      <p class="text-red-500 text-sm mb-4 text-center">Kullanıcı adı veya şifre hatalı.</p>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Kullanıcı Adı</label>
        <input name="username" type="text" autocomplete="username" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
        <input name="password" type="password" autocomplete="current-password" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
        Giriş Yap
      </button>
    </form>
  </div>
</body>
</html>
